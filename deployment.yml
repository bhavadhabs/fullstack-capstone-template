apiVersion: apps/v1
kind: Deployment
metadata:
  name: giftapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: giftapp
  template:
    metadata:
      labels:
        app: giftapp
    spec:
      containers:
        - name: giftapp
          image: giftapp:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3060

          # 🔥 CRITICAL FIX (DO NOT REMOVE)
          env:
            - name: MONGO_URI
              value: mongodb://mongodb-service:27017/giftlink
            - name: JWT_SECRET
              value: setasecret

---
apiVersion: v1
kind: Service
metadata:
  name: giftapp-service
spec:
  type: NodePort
  selector:
    app: giftapp
  ports:
    - port: 3060
      targetPort: 3060
      nodePort: 30007